<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none" role="img" aria-labelledby="title">
  <title id="title">Cyverix Solutions</title>
  <defs>
    <linearGradient id="cyvGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00FFB2"/>
      <stop offset="55%" stop-color="#00C8FF"/>
      <stop offset="100%" stop-color="#7B5EA7"/>
    </linearGradient>
    <linearGradient id="cyvGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#00FFB2" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#00FFB2" stop-opacity="0"/>
    </linearGradient>
    <filter id="cyvSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="120" height="120" rx="28" fill="#0A0A0F"/>
  <rect width="120" height="120" rx="28" fill="url(#cyvGlow)" opacity="0.9"/>
  <!-- Hex frame: tech / structure -->
  <path
    d="M60 18 L88 34 V76 L60 92 L32 76 V34 Z"
    stroke="url(#cyvGrad)"
    stroke-width="2.25"
    stroke-linejoin="round"
    fill="rgba(0,255,178,0.06)"
  />
  <!-- Inner C mark -->
  <path
    d="M60 38 C48 38 38 48 38 60 C38 72 48 82 60 82 C68 82 75 78 79 71"
    stroke="url(#cyvGrad)"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
    filter="url(#cyvSoft)"
  />
  <!-- Digital node -->
  <circle cx="79" cy="52" r="4" fill="#00FFB2"/>
  <circle cx="79" cy="52" r="7" stroke="#7B5EA7" stroke-width="1" opacity="0.8" fill="none"/>
</svg>
